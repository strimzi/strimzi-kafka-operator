apiVersion: kafka.strimzi.io/v1
kind: KafkaBridge
metadata:
  name: my-bridge
spec:
  replicas: 1
  bootstrapServers: my-cluster-kafka-bootstrap:9092
  http:
    port: 8443
    tls:
      certificateAndKey:
        secretName: my-bridge-cert-secret
        certificate: cert.crt
        key: key.key
