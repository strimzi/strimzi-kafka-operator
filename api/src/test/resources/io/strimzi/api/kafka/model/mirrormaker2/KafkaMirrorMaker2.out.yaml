---
apiVersion: "kafka.strimzi.io/v1"
kind: "KafkaMirrorMaker2"
metadata:
  name: "test-kafka-mirror-maker-2"
spec:
  replicas: 6
  image: "foo"
  target:
    alias: "my-target"
    bootstrapServers: "my-target-kafka:9092"
    groupId: "my-mirror-maker-2-group"
    configStorageTopic: "my-mirror-maker-2-config"
    statusStorageTopic: "my-mirror-maker-2-status"
    offsetStorageTopic: "my-mirror-maker-2-offset"
  mirrors:
  - source:
      alias: "my-source"
      bootstrapServers: "my-source-kafka:9092"
    sourceConnector:
      tasksMax: 2
      config:
        replication.factor: 1
        offset-syncs.topic.replication.factor: 1
    checkpointConnector:
      tasksMax: 2
      config:
        checkpoints.topic.replication.factor: 1
    topicsPattern: "my-topic"
    groupsPattern: "my-group"
  template:
    pod:
      tolerations:
      - effect: "NoSchedule"
        key: "key1"
        operator: "Equal"
        value: "value1"
      - effect: "NoSchedule"
        key: "key2"
        operator: "Equal"
        value: "value2"
