apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: strimzi-ephemeral
spec:
  kafka:
    replicas: 3
    storage:
      type: foobar
    listeners:
      - name: plain
        type: internal
        tls: false
        port: 9092
      - name: tls
        type: foobar
        tls: true
        port: 9093