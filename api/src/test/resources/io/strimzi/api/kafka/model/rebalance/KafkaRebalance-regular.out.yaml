---
apiVersion: "kafka.strimzi.io/v1"
kind: "KafkaRebalance"
metadata:
  labels:
    strimzi.io/cluster: "my-cluster"
  name: "my-rebalance"
spec:
  mode: "full"
  goals:
  - "CpuCapacityGoal"
  - "NetworkInboundCapacityGoal"
  - "DiskCapacityGoal"
  - "RackAwareGoal"
  - "MinTopicLeadersPerBrokerGoal"
  - "NetworkOutboundCapacityGoal"
  - "ReplicaCapacityGoal"
  skipHardGoalCheck: false
