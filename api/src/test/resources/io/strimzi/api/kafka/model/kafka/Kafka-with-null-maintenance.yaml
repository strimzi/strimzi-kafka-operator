apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: strimzi-ephemeral
spec:
  kafka:
    listeners:
      - name: plain
        type: internal
        tls: false
        port: 9092
      - name: tls
        type: internal
        tls: true
        port: 9093
  maintenanceTimeWindows:
    -