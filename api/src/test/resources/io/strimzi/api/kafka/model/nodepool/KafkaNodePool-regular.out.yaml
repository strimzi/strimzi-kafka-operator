---
apiVersion: "kafka.strimzi.io/v1"
kind: "KafkaNodePool"
metadata:
  labels:
    strimzi.io/cluster: "my-cluster"
  name: "broker"
spec:
  replicas: 3
  storage:
    type: "jbod"
    volumes:
    - id: 0
      type: "persistent-claim"
      size: "100Gi"
      kraftMetadata: "shared"
  roles:
  - "broker"
