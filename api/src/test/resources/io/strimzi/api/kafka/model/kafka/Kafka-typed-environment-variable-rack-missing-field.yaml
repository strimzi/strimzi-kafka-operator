apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: strimzi-minimal
spec:
  kafka:
    rack:
      type: environment-variable
    listeners:
      - name: plain
        type: internal
        tls: false
        port: 9092
      - name: tls
        type: internal
        tls: true
        port: 9093
