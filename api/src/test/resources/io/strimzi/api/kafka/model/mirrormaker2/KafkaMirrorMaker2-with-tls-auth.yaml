apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: test-kafka-mirror-maker-2
spec:
  image: foo
  replicas: 6
  target:
    alias: my-target
    bootstrapServers: my-target-kafka:9092
    groupId: my-mirror-maker-2-group
    configStorageTopic: my-mirror-maker-2-config
    offsetStorageTopic: my-mirror-maker-2-offset
    statusStorageTopic: my-mirror-maker-2-status
    tls:
      trustedCertificates:
        - secretName: my-secret
          certificate: ca.crt
        - secretName: my-another-secret
          certificate: another-ca.crt
    authentication:
      type: tls
      certificateAndKey:
        secretName: my-user-secret
        key: user.key
        certificate: user.crt
  mirrors:
    - source:
        alias: my-source
        bootstrapServers: my-source-kafka:9092
        tls:
          trustedCertificates:
            - secretName: my-secret
              certificate: ca.crt
            - secretName: my-another-secret
              certificate: another-ca.crt
        authentication:
          type: tls
          certificateAndKey:
            secretName: my-user-secret
            key: user.key
            certificate: user.crt
      sourceConnector: {}
      topicsPattern: my-topic
