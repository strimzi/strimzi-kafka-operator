---
apiVersion: "kafka.strimzi.io/v1"
kind: "KafkaConnect"
metadata:
  name: "test-kafka-connect"
spec:
  replicas: 6
  image: "foo"
  bootstrapServers: "kafka:9092"
  groupId: "my-connect-group"
  configStorageTopic: "my-connect-configs"
  statusStorageTopic: "my-connect-status"
  offsetStorageTopic: "my-connect-offsets"
  config:
    name: "bar"
  template:
    pod:
      tolerations:
      - effect: "NoSchedule"
        key: "key1"
        operator: "Equal"
        value: "value1"
      - effect: "NoSchedule"
        key: "key2"
        operator: "Equal"
        value: "value2"
