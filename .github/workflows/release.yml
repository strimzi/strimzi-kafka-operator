name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (e.g., 0.49.0 for GA or 0.49.0-rc1 for RC)'
        required: true
        type: string
      useSuffix:
        description: 'Build suffixed images (e.g., 0.49.0-0 before final 0.49.0)'
        required: true
        type: boolean
        default: true
      releaseSuffix:
        description: 'Release Suffix (e.g., 0 for 0.49.0-0, used only if useSuffix is true)'
        required: true
        type: string
        default: '0'
      sourceBuildRunId:
        description: 'GitHub Actions Run ID of the source build (find in Actions tab URL)'
        required: true
        type: string

# Declare default permissions as read only
permissions:
  contents: read

jobs:
  # Prepare release artifacts - builds release files, documentation, and pushes to Maven Central
  prepare-release-artifacts:
    name: Prepare Release Artifacts
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Java and Maven
        uses: strimzi/github-actions/.github/actions/dependencies/setup-java@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          javaVersion: "21"

      - name: Install yq
        uses: strimzi/github-actions/.github/actions/dependencies/install-yq@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          version: "v4.6.3"

      - name: Install Helm
        uses: strimzi/github-actions/.github/actions/dependencies/install-helm@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          helmVersion: "v3.16.0"

      - name: Install AsciiDoctor
        uses: strimzi/github-actions/.github/actions/dependencies/install-ascii-doctor@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          rubyVersion: "3.2"

      - name: Prepare release artifacts
        uses: strimzi/github-actions/.github/actions/build/release-artifacts@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          releaseVersion: ${{ inputs.releaseVersion }}
          artifactSuffix: "operators"

      - name: Deploy to Maven Central
        uses: strimzi/github-actions/.github/actions/build/deploy-java@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          modules: "./,crd-annotations,crd-generator,test,api"
          gpgPassphrase: ${{ secrets.GPG_PASSPHRASE }}
          gpgSigningKey: ${{ secrets.GPG_SIGNING_KEY }}
          centralUsername: ${{ secrets.CENTRAL_USERNAME }}
          centralPassword: ${{ secrets.CENTRAL_PASSWORD }}

      - name: "Build documentation"
        uses: ./.github/actions/build/build-docs
        with:
          artifactName: "documentation.tar"
          releaseVersion: ${{ inputs.releaseVersion }}

  # Push Java artifacts to GHCR for long-term storage (for CVE rebuilds)
  push-java-artifacts-to-ghcr:
    name: Push Java artifacts to GHCR
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: Download strimzi binaries from source build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-operators.tar
          run-id: ${{ inputs.sourceBuildRunId }}
          github-token: ${{ github.token }}

      - name: Login to GHCR
        run: echo "${{ github.token }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Java artifacts to GHCR
        run: |
          oras push ghcr.io/${{ env.REPOSITORY }}/binaries-operators:${{ env.TAG }} binaries-operators.tar:application/x-tar
        env:
          TAG: ${{ inputs.releaseVersion }}-${{ inputs.sourceBuildRunId }}
          REPOSITORY: "strimzi"

  # Push containers with suffix (e.g., 0.49.0-0) - optional step
  push-containers-with-suffix:
    name: Push Containers with suffix
    needs:
      - prepare-release-artifacts
      - push-java-artifacts-to-ghcr
    if: ${{ startsWith(github.ref, 'refs/heads/release-') && inputs.useSuffix == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      images: ${{ steps.push-containers.outputs.images }}
      sbomsArtifact: ${{ steps.push-containers.outputs.sbomsArtifact }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Docker
        uses: strimzi/github-actions/.github/actions/dependencies/install-docker@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2

      - name: Install yq
        uses: strimzi/github-actions/.github/actions/dependencies/install-yq@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          version: "v4.6.3"

      - name: Install Syft
        uses: strimzi/github-actions/.github/actions/dependencies/install-syft@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          version: "1.20.0"

      - name: Push containers using push-containers action
        id: push-containers
        uses: strimzi/github-actions/.github/actions/build/push-containers@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: "${{ inputs.releaseVersion }}-${{ inputs.releaseSuffix }}"
          architectures: "amd64,arm64,ppc64le,s390x"
          artifactSuffix: "operators"
          buildRunId: ${{ inputs.sourceBuildRunId }}

  # Attest containers with suffix
  attest-with-suffix:
    name: Attestation (with suffix)
    needs:
      - push-containers-with-suffix
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: strimzi/github-actions/.github/workflows/reusable-attest.yml@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
    with:
      containerImages: ${{ needs.push-containers-with-suffix.outputs.images }}
      sbomsArtifact: ${{ needs.push-containers-with-suffix.outputs.sbomsArtifact }}

  # Push containers without suffix (e.g., 0.49.0)
  push-containers:
    name: Push Containers without suffix (${{ inputs.releaseVersion }})
    needs:
      - push-containers-with-suffix
      - push-java-artifacts-to-ghcr
      - prepare-release-artifacts
    # Run if push-containers-with-suffix succeeded/skipped and we're on a release branch
    if: |-
      ${{ always() && startsWith(github.ref, 'refs/heads/release-') &&
        needs.prepare-release-artifacts.result == 'success' &&
        needs.push-java-artifacts-to-ghcr.result == 'success' &&
        (needs.push-containers-with-suffix.result == 'success' ||
        needs.push-containers-with-suffix.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      images: ${{ steps.push-containers.outputs.images }}
      sbomsArtifact: ${{ steps.push-containers.outputs.sbomsArtifact }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Docker
        uses: strimzi/github-actions/.github/actions/dependencies/install-docker@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2

      - name: Install yq
        uses: strimzi/github-actions/.github/actions/dependencies/install-yq@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          version: "v4.6.3"

      - name: Install Syft
        uses: strimzi/github-actions/.github/actions/dependencies/install-syft@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          version: "1.20.0"

      - name: Push containers using push-containers action
        id: push-containers
        uses: strimzi/github-actions/.github/actions/build/push-containers@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: "${{ inputs.releaseVersion }}"
          architectures: "amd64,arm64,ppc64le,s390x"
          artifactSuffix: "operators"
          buildRunId: ${{ inputs.sourceBuildRunId }}

  # Publish Helm Chart as OCI artifact
  publish-helm-chart:
    name: Publish Helm Chart
    needs:
      - prepare-release-artifacts
      - push-java-artifacts-to-ghcr
      - push-containers
    if: |-
      ${{ always() && startsWith(github.ref, 'refs/heads/release-') &&
        needs.push-containers.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.publish-helm-chart.outputs.image }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Helm
        uses: strimzi/github-actions/.github/actions/dependencies/install-helm@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          helmVersion: "v3.16.0"

      - name: Publish Helm charts using publish-helm action
        id: publish-helm-chart
        uses: strimzi/github-actions/.github/actions/build/publish-helm-chart@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
        with:
          registryUser: ${{ secrets.QUAY_HELM_USER }}
          registryPassword: ${{ secrets.QUAY_HELM_PASS }}
          containerRegistry: "quay.io"
          containerOrg: "strimzi-helm"
          helmChartName: "strimzi-kafka-operator-helm-3-chart"
          releaseVersion: ${{ inputs.releaseVersion }}
          artifactSuffix: "operators"

  # Attest release archives, Helm chart, and container images
  attest:
    name: Attestation
    needs:
      - push-containers
      - prepare-release-artifacts
      - publish-helm-chart
    if: |-
      ${{ always() && startsWith(github.ref, 'refs/heads/release-') &&
        needs.push-containers.result == 'success'
      }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: strimzi/github-actions/.github/workflows/reusable-attest.yml@af789b85722d00ba9de34ad8b3a32292e4e628e3 # v2.2
    with:
      containerImages: ${{ needs.push-containers.outputs.images }}
      sbomsArtifact: ${{ needs.push-containers.outputs.sbomsArtifact }}
      artifactSuffix: "operators"
      releaseVersion: ${{ inputs.releaseVersion }}
      helmChartName: "strimzi-kafka-operator-helm-3-chart"
      helmChartImage: ${{ needs.publish-helm-chart.outputs.image }}

  # Run Snyk security scans on Maven dependencies and container images
  snyk-scan:
    name: Snyk Scan
    needs:
      - prepare-release-artifacts
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/snyk.yml
    with:
      releaseVersion: ${{ inputs.releaseVersion }}
      sourceBuildRunId: ${{ inputs.sourceBuildRunId }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # Run FOSSA scans on Maven dependencies and container images
  fossa-scan:
    name: FOSSA Scan
    needs:
      - prepare-release-artifacts
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/fossa.yml
    with:
      releaseVersion: ${{ inputs.releaseVersion }}
      sourceBuildRunId: ${{ inputs.sourceBuildRunId }}
    secrets:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
