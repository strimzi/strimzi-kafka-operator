name: "Test Strimzi"
description: "Runs Strimzi unit and integration tests with Maven"

runs:
  using: "composite"
  steps:
    - name: Setup Java and Maven
      uses: strimzi/github-actions/.github/actions/dependencies/setup-java@main
      with:
        javaVersion: "21"

    - name: Install Docker
      uses: strimzi/github-actions/.github/actions/dependencies/install-docker@main

    - name: Install yq
      uses: strimzi/github-actions/.github/actions/dependencies/install-yq@main
      with:
        version: "v4.6.3"

    - name: Install Helm
      uses: strimzi/github-actions/.github/actions/dependencies/install-helm@main
      with:
        helmVersion: "v3.16.0"

    - name: Restore Maven cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.m2/repository
        key: maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-

    - name: Setup Kind cluster
      uses: strimzi/github-actions/.github/actions/dependencies/setup-kind@main
      with:
        controlNodes: 1
        workerNodes: 3
        kindVersion: 0.31.0
      env:
        KIND_NODE_IMAGE: "oldest"
        
    - name: Run unit and integration tests
      shell: bash
      run: |
        mvn -e -V -B -Dmaven.javadoc.skip=true \
          -Dsurefire.rerunFailingTestsCount=5 \
          -Dfailsafe.rerunFailingTestsCount=2 \
          install
      env:
        # Test container optimization and eliminate pulling RYUK image from DockerHub to prevent limits
        TESTCONTAINERS_RYUK_DISABLED: true
        TESTCONTAINERS_CHECKS_DISABLE: true
        # Disable container logging for cleaner test output
        STRIMZI_TEST_CONTAINER_LOGGING_ENABLED: false
        
    - name: Publish test results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'Unit & Integration Tests'
        path: '**/TEST-*.xml'
        reporter: java-junit
        fail-on-error: false
        
    - name: Upload test coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false