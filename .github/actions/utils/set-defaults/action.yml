name: "Set default variables for system tests"
description: "Set default variables for system tests"

runs:
  using: "composite"
  steps:
    - name: Configure environment variables
      id: set-env
      shell: bash
      env:
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
      run: |
        echo "Ref name: $GITHUB_REF_NAME"
        
        echo "COMMIT=$GITHUB_SHA" >> $GITHUB_ENV
        echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_ENV
        
        # Check if we're in a pull request context
        if [[ "${{ github.event.issue.pull_request }}" != "" && "${{ github.event.issue.pull_request }}" != "null" ]] || [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "Detected: Pull Request"
          
          echo "PULL_REQUEST=true" >> $GITHUB_ENV
          echo "DOCKER_ORG=strimzi" >> $GITHUB_ENV
          echo "TAG=pr" >> $GITHUB_ENV
          # For PR events, preserve the DOCKER_REGISTRY set by setup-kind (Kind registry)
        else
          # Not a PR - use standard Strimzi settings
          echo "PULL_REQUEST=false" >> $GITHUB_ENV
          echo "DOCKER_ORG=strimzi" >> $GITHUB_ENV
          echo "DOCKER_REGISTRY=quay.io" >> $GITHUB_ENV
        fi
    - name: Fix OCI ARM nftables blocking Docker bridge traffic
      if: ${{ matrix.config.arch == 'arm64' }}
      shell: bash
      run: |
        # OCI ARM image has a catch-all "reject with icmp-host-prohibited" in the
        # nftables INPUT chain that blocks traffic from Docker bridge to the host.
        # This prevents Kind nodes/pods from reaching the registry via the host IP.
        # Insert an accept rule for Docker bridge traffic before the reject rule.
        sudo nft insert rule ip filter INPUT iifname "br-*" accept
        sudo nft insert rule ip filter FORWARD iifname "br-*" accept